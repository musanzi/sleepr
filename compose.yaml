services:
  reservations:
    build:
      context: .
      dockerfile: ./apps/reservations/Dockerfile
      target: ${STAGE}
    depends_on:
      - sleepr-db
    ports:
      - 3000:3000
  auth:
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
      target: ${STAGE}
    depends_on:
      - sleepr-db
    ports:
      - 3001:3001
  sleepr-db:
    image: mariadb:12.2
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
  adminer:
    image: adminer:latest
    container_name: sleepr-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - sleepr-db
volumes:
  mariadb_data:
